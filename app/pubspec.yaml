version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.5.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: any
  flutter_secure_storage: ^9.2.2
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.3.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  mobile_scanner: ^7.2.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  http_mock_adapter: ^0.6.1
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
  generate: true
